# CI/CD pipeline для автоматического запуска UI-тестов и публикации Allure-отчёта.
#
# Как это работает:
# 1. При пуше в main или создании PR - запускаются тесты в headless-режиме
# 2. Результаты тестов сохраняются как артефакт (allure-results)
# 3. Генерируется HTML-отчёт Allure и публикуется на GitHub Pages
#
# Allure-отчёт доступен по адресу:
# https://<username>.github.io/simbirsoft-ui-tests/

name: UI Tests

on:
  # Запускаем при пуше в основную ветку
  push:
    branches: ["main"]
  # Запускаем при создании Pull Request
  pull_request:
    branches: ["main"]
  # Можно запустить вручную из интерфейса GitHub
  workflow_dispatch:

# Разрешаем запись в репозиторий (нужно для публикации на gh-pages)
permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонируем репозиторий
      - name: Checkout
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем Python 3.10
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Шаг 3: Устанавливаем зависимости из requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Шаг 4: Запускаем тесты в headless-режиме
      # continue-on-error: true - чтобы pipeline продолжился даже при падении тестов
      # (нам нужно сгенерировать отчёт в любом случае)
      - name: Run UI tests
        id: run_tests
        continue-on-error: true
        run: |
          pytest --headless --alluredir=allure-results

      # Шаг 5: Сохраняем результаты тестов как артефакт
      # Артефакт можно скачать из интерфейса GitHub Actions
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      # Шаг 6: Устанавливаем Java (нужна для Allure CLI)
      - name: Setup Java
        if: always() && github.event_name != 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Шаг 7: Скачиваем Allure CLI и генерируем HTML-отчёт
      - name: Build Allure report
        if: always() && github.event_name != 'pull_request'
        run: |
          curl -fsSL -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
          tar -xzf allure.tgz
          ./allure-2.32.0/bin/allure generate allure-results --clean -o allure-report

      # Шаг 8: Публикуем отчёт на GitHub Pages (ветка gh-pages)
      - name: Publish Allure report to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      # Шаг 9: Если тесты упали - помечаем pipeline как failed
      - name: Fail pipeline if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

