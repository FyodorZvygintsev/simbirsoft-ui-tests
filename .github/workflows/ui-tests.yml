name: UI Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run UI tests with Allure results
        id: run_tests
        continue-on-error: true
        run: |
          pytest -m ui --headless --strict-driver --alluredir=allure-results

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Setup Java
        if: always() && github.event_name != 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Allure report
        if: always() && github.event_name != 'pull_request'
        run: |
          curl -fsSL -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
          tar -xzf allure.tgz
          ./allure-2.32.0/bin/allure generate allure-results --clean -o allure-report

      - name: Publish Allure report to gh-pages
        if: always() && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Mark workflow as failed when tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

